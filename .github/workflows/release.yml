name: Release

# Build Keyhaven installers for Windows, macOS, and Linux and publish them as a
# GitHub Release whenever a version tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags:
      - "v*"

# tauri-action needs write access to create the release and upload assets.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # Intel
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        # Use `npm install` (not `npm ci`): the lockfile can legitimately omit
        # some platform-specific optional deps (e.g. rolldown/@emnapi wasm
        # fallbacks), which makes `npm ci`'s strict sync check fail on the
        # runners. `npm install` reconciles per-platform and is what the
        # official tauri-action examples use.
        run: npm install

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Keyhaven ${{ github.ref_name }}"
          releaseBody: |
            Keyhaven ${{ github.ref_name }} — offline-first, encrypted password manager.

            Download the installer for your platform from the assets below.

            - Windows: `.exe` (NSIS) or `.msi`
            - macOS: `.dmg` (Intel and Apple Silicon)
            - Linux: `.AppImage` or `.deb`

            Note: builds are not code-signed yet, so your OS may show an
            "unknown publisher" / Gatekeeper prompt on first launch.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
